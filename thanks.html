<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover your pathway to English fluency with us! Thank you for trusting Fluency Link Academy. Your language journey starts now."
    />
    <title>Thank You for Joining Fluency Link Academy</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .thank-you-section {
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        max-width: 800px;
        margin: 0 auto;
        margin-top: 100px;
      }
      h1 {
        font-size: 38px;
      }
      .cta-button {
        display: inline-block;
        background: linear-gradient(to right, #5c9eca, #2a517c);
        color: #fff;
        font-size: 1.1rem;
        padding: 12px 25px;
        text-decoration: none;
        border-radius: 30px;
        margin-top: 20px;
        transition: background 0.3s ease, transform 0.2s ease;
      }

      .cta-button:hover {
        background: linear-gradient(to right, #2a517c, #5c9eca);
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="thank-you-section">
        <h1>Thank You for Choosing Fluency Link Academy!</h1>
        <p>
          We’re thrilled to have you on board as part of our community of
          learners and achievers. At Fluency Link Academy, your success in
          mastering English is our mission.
        </p>

        <p><strong>The Fluency Link Academy Team</strong></p>
        <a class="cta-button" href="index.html">Return to Home</a>
      </div>
    </main>
  </body>
</html>
